name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest  # net462 exe requires Windows
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for 'git describe --tags' in build.fsx

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - run: dotnet fsi build.fsx Zip

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bin/*.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.zip
          body: |
            ## Verify provenance

            The release zip is built and signed via GitHub Actions. Verify with the [GitHub CLI](https://cli.github.com/):

            ```
            gh attestation verify <XrmTypeScript-vX.X.X-bin.zip> --repo Mosh-K/XrmTypeScript
            ```

            [View attestations](https://github.com/Mosh-K/XrmTypeScript/attestations)
